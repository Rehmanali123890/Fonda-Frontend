<div class="card mb-3">
    <div class="card-body">
      <!-- <div class="card-header">
        <h4 id="form-div-heading">Finance Report</h4>
      </div> -->
      <div class="row">
        <div class="form-group col-md-3">
            <label>{{ "Reports.Restaurant Name" | transloco }}</label>
            <ng-select
              [(ngModel)]="merchantId"
              (ngModelChange)="MerchantChanged()"
              [clearable]="false"
              [loading]="gettingMerchants"
              [searchable]="true"
              type="text"
              class="bg ng-select-side-nav"
              placeholder="Select Merchant"
            >
            <ng-option [value]="'-1'">
                All
            </ng-option>
              <!-- <ng-option [value]="'-1'">All</ng-option> -->
              <ng-option [value]="item.id" *ngFor="let item of MerchantsList">
                {{ item.merchantName }}
              </ng-option>
            </ng-select>
          </div>
        <div class="form-group col-md-3">
          <label>{{ "reuseableWords.From Date" | transloco }}</label>
          <input
            class="input-style"
            [readonly]="filterType != 5"
            [disabled]="filterType != 5"
            [(ngModel)]="startDate"
            type="date"
            placeholder="Start Date"
          />
        </div>
        <div class="form-group col-md-3">
          <label>{{ "reuseableWords.To Date" | transloco }}</label>
          <input
            class="input-style"
            [readonly]="filterType != 5"
            [disabled]="filterType != 5"
            [(ngModel)]="endDate"
            type="date"
            placeholder="End Date"
          />
        </div>
        <div class="form-group col-md-3">
          <label>{{ "reuseableWords.Days" | transloco }}</label>
          <select
            [(ngModel)]="filterType"
            id="printCopies"
            (change)="changeDateAccordinglyAndSearch()"
            class="input-style"
            id="order-date-form"
            aria-label="Default select example"
            id="drop-form"
          >
            <!-- <option [value]="1">Today</option> -->
            <option [value]="2">
              {{ "reuseableWords.Last 7 days" | transloco }}
            </option>
            <option [value]="3">
              {{ "reuseableWords.Last week" | transloco }}
            </option>
            <option [value]="4">
              {{ "reuseableWords.Last Month" | transloco }}
            </option>
            <option [value]="5">{{ "reuseableWords.Custom" | transloco }}</option>
          </select>
          <div></div>
          <div></div>
        </div>
        <div class="form-group col-md-3">
            <label>{{ "reuseableWords.Platform" | transloco }}</label>
            <select
                [(ngModel)]="platform_type_value" 
                (change)="selectPlatformType()"  
                class="input-style"
                id="drop-form"
                aria-label="Default select example"
            >
                <option [value]="1">{{ "reuseableWords.Doordash" | transloco }}</option>
                <option [value]="2">{{ "reuseableWords.UberEats" | transloco }}</option>
                <option [value]="3">{{ "reuseableWords.Grubhub" | transloco }}</option>
                <option [value]="4">{{ "reuseableWords.Storefront" | transloco }}</option>
                <option [value]="5">{{ "reuseableWords.All" | transloco }}</option>
            </select>
        </div>
        <div class="form-group col-md-3">
            
        </div>
        <div class="form-group col-md-3">
            
        </div>


        <div class="col-md-4">
          <label style="visibility: hidden; margin-bottom: 0px">Button</label>
          <button
            type="submit"
            class="btn button-theme"
            (click)="generateNegativeNoOrderReport()"
          >
            {{ "reuseableWords.APPLY" | transloco }}
            <!--<span *ngIf="parsingData" class="spinner-border spinner-border-sm ms-2" style="width: 1rem; height: 1rem;" role="status" aria-hidden="true">
            </span>-->
          </button>
        </div>
  
        <div class="col-md-4">
          <!-- Export Button with Bootstrap Classes -->
          <label style="visibility: hidden; margin-bottom: 0px">Button</label>
          <button class="btn button-theme dropdown-toggle" [disabled]="disableExport" type="button" id="exportButton" data-bs-toggle="dropdown" aria-expanded="false">
            {{ "Reports.Download" | transloco }}
            <span *ngIf="exporting" class="spinner-border spinner-border-sm ms-2" style="width: 1rem; height: 1rem;" role="status" aria-hidden="true">
            </span>
          </button>
  
          <!-- Dropdown Menu with Bootstrap Classes -->
          <ul class="dropdown-menu" aria-labelledby="exportButton">
            <li class="py-2"><a class="dropdown-item" (click)="downloadProblematicFile('excel')"><img src="../../../assets/icons/export.svg" alt="" style="filter: invert(100%) brightness(0%); height: 20px;" />&nbsp;&nbsp;Excel</a></li>
            <li class="py-2"><a class="dropdown-item" (click)="downloadProblematicFile('csv')"><img src="../../../assets/icons/export.svg" alt="" style="filter: invert(100%) brightness(0%);height: 20px;" />&nbsp;&nbsp;CSV</a></li>
          </ul>
        </div>
      </div>
    </div>
</div>

<div class="col-md-12">
    <div class="row">
      <div class="card" style="padding: 0px">
        <div class="card-header" style="border-bottom: 0px !important">
          <h4>{{ "Reports.Problematic Transaction Report" | transloco }}</h4>
        </div>
        <div class="table-responsive">
          <div *ngIf="parsingData" class="text-center mt-3">
            <span class="spinner-border spinner-border-lg" role="status" aria-hidden="true"></span>
          </div>
          <!--<div
          *ngIf="parsingData"
          class="d-flex justify-content-center text-center"
        >
          <mat-progress-bar
            class="progress primary-color-dark mb-0"
            mode="indeterminate"
          ></mat-progress-bar>
        </div>-->
          <table class="table table-bordered table-hover transaction-table">
              <thead class="sticky-head">
                <tr style="border-bottom: none">
                  <th style="border-bottom: none" *ngFor="let header of getModifiedHeaders()">
                    {{ header }}
                    
                  </th>
                  <th style="border-bottom: none" *ngIf="getModifiedHeaders().length === 0 && !this.parsingData">No records available for the given period.</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let row of getModifiedRows(); let i = index">
                  <td *ngFor="let cell of row">{{ formatCell(cell) }}</td>
                </tr>
              </tbody>
          </table>
        </div>
      </div>
    </div>
</div>
