<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      var name = window.location.pathname.split("/")[1] ;
      var hostname = window.location.hostname.split('.');
      var onlyHost = hostname.slice(0, hostname.length - 1 || 1).join('.')
            
      if(name && name != 'home' && name != 'accounts'){
        document.title = name + ' | ' + onlyHost;
      }else{
        document.title = 'MiFonda';
      }
    </script>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="./assets/icons/favicon.png" />

    <link

      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"

    />
    <link
      rel="stylesheet"

      crossorigin="anonymous"
    />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"

    />
    <link

    <!-- Set the <meta> theme color: -->
    <meta name="theme-color" content="#ffffff" />
    <!-- Set Status Bar Style for iOS -->

      name="apple-mobile-web-app-status-bar-style"

    />

      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#000000"
      media="(prefers-color-scheme: dark)"
    />
  </head>
